name: youtube-chapters
version: 0.1.0
description: >
  Generate YouTube chapter markers (timestamped table of contents) for a
  video. Pulls captions or transcribes locally with Whisper, then uses the
  Hermes LLM to title each chapter. Output is paste-ready for the video
  description.
author: Hermes plugin
schema_version: 21
entrypoint: __init__:register
tools:
  - youtube_generate_chapters
requires:
  python: ">=3.10"
  hermes: ">=0.14.0"
